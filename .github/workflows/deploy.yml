name: Agentic Deploy & Self-Heal

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python (For the AI Brain)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          npm install -g firebase-tools
          pip install google-generativeai
          cd functions && npm install

      - name: Authenticate Service Account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json" >> $GITHUB_ENV

      - name: Inject Environment Secrets
        run: |
          cd functions
          echo "DAILY_API_KEY=${{ secrets.DAILY_API_KEY }}" > .env

      - name: Deploy Backend Functions
        run: firebase deploy --only functions --project=virtual-tour-platform-492518

      - name: Run Smoke Test on Daily.co Bridge
        id: smoke_test
        continue-on-error: true  # Prevents the pipeline from instantly crashing so the AI can fix it
        run: |
          echo "🤖 Agent probing live Firebase function..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://createdailyroom-54vwgyfqga-uc.a.run.app)
          HTTP_BODY=$(echo "$RESPONSE" | sed '$d')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          
          echo "STATUS=$HTTP_STATUS" >> $GITHUB_ENV
          echo "BODY=$HTTP_BODY" >> $GITHUB_ENV
          
          if [ "$HTTP_STATUS" -ne 200 ] || [[ "$HTTP_BODY" == *"error"* ]] || [[ "$HTTP_BODY" != *"daily.co"* ]]; then
            echo "❌ SMOKE TEST FAILED! Activating AI Brain..."
            exit 1
          fi
          echo "✅ SMOKE TEST PASSED!"

      # PHASE 3: THE AI SELF-HEALING BRAIN (Runs ONLY if the step above failed)
      - name: AI Self-Healing Core
        if: steps.smoke_test.outcome == 'failure'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python -c '
          import os
          import google.generativeai as genai

          genai.configure(api_key=os.environ["GEMINI_API_KEY"])
          model = genai.GenerativeModel("gemini-1.5-flash")

          # Read current broken index.js
          with open("functions/index.js", "r") as f:
              current_code = f.read()

          error_context = f"Status: {os.environ.get(\"STATUS\")}\nBody: {os.environ.get(\"BODY\")}"

          prompt = f"""
          You are an automated self-healing engineering agent.
          The following Firebase Cloud Function code is failing its live smoke test.
          
          ERROR LOGS:
          {error_context}

          CURRENT CODE:
          {current_code}

          Fix the code to resolve the error. Reply ONLY with the raw, corrected JavaScript code. Do not include markdown code blocks, do not explain anything. Just the pure code.
          """

          response = model.generate_content(prompt)
          fixed_code = response.text.replace("```javascript", "").replace("```", "").strip()

          with open("functions/index.js", "w") as f:
              f.write(fixed_code)
          print("🤖 AI has rewritten functions/index.js to fix the error!")
          '

      # Retry deployment with the fixed code if it failed the first time
      - name: Retry Deploy and Test
        if: steps.smoke_test.outcome == 'failure'
        run: |
          echo "🚀 Re-deploying fixed AI code..."
          firebase deploy --only functions --project=virtual-tour-platform-492518
          
          echo "🤖 Running final verification..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://createdailyroom-54vwgyfqga-uc.a.run.app)
          HTTP_BODY=$(echo "$RESPONSE" | sed '$d')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          
          if [ "$HTTP_STATUS" -ne 200 ] || [[ "$HTTP_BODY" == *"error"* ]]; then
            echo "❌ Self-healing failed to resolve the issue."
            exit 1
          fi
          echo "🎉 Self-healing successful! System is online."
