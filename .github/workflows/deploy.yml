name: Agentic Deploy & Self-Heal

on:
  push:
    branches:
      - main

jobs:
  deploy_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      - name: Install Backend Dependencies
        run: |
          cd functions
          npm install

      - name: Authenticate Service Account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json" >> $GITHUB_ENV

      - name: Deploy Backend Functions
        run: firebase deploy --only functions --project=virtual-tour-platform-492518

      # PHASE 2: THE EYES (Clean & properly aligned)
      - name: Run Smoke Test on Daily.co Bridge
        run: |
          echo "🤖 Agent probing live Firebase function..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://createdailyroom-54vwgyfqga-uc.a.run.app)
          
          HTTP_BODY=$(echo "$RESPONSE" | sed '$d')
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          
          echo "Cloud Function Response Status: $HTTP_STATUS"
          echo "Cloud Function Response Body: $HTTP_BODY"
          
          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "❌ ERROR DETECTED: Firebase returned status $HTTP_STATUS"
            exit 1
          fi
          
          if [[ "$HTTP_BODY" == *"error"* ]] || [[ "$HTTP_BODY" != *"daily.co"* ]]; then
            echo "❌ ERROR DETECTED: Daily.co bridge is broken or timed out (Black Screen Risk)!"
            exit 1
          fi
          
          echo "✅ SMOKE TEST PASSED: Room created successfully! Zero black screen risk."
