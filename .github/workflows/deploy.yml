name: Agentic Deploy & Self-Heal

on:
  push:
    branches:
      - main

jobs:
  deploy_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # Upgraded to Node 22 to fix that deprecation warning!

      - name: Install Firebase Tools
        run: npm install -g firebase-tools

      # NEW STEP: Fixes the missing package error by installing dependencies first
      - name: Install Backend Dependencies
        run: |
          cd functions
          npm install

      - name: Authenticate Service Account
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/service-account.json" >> $GITHUB_ENV

      - name: Deploy Backend Functions
        run: firebase deploy --only functions --project=virtual-tour-platform-492518

      - name: Run Smoke Test on Daily.co Bridge
        run: |
          echo "Testing if the Firebase Function is responsive..."
