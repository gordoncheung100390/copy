<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GROUP TELEPORT | 6.6 FINAL</title>
    
    <script>
      (g=>{var h,a,k,p="The Google Maps JavaScript API",c="google",l="importLibrary",q="__ib__",m=document,b=window;b=b[c]||(b[c]={});var d=b.maps||(b.maps={}),r=new Set,e=new URLSearchParams,u=()=>h||(h=new Promise(async(f,n)=>{await (a=m.createElement("script"));e.set("libraries",[...r]+"");for(k in g)e.set(k.replace(/[A-Z]/g,t=>"_"+t[0].toLowerCase()),g[k]);e.set("callback",c+".maps."+q);a.src=`https://maps.${c}apis.com/maps/api/js?`+e;d[q]=f;a.onerror=()=>h=n(Error(p+" could not load."));a.nonce=m.querySelector("script[nonce]")?.nonce||"";m.head.append(a)}));d[l]?console.warn(p+" only loads once. Re-trying:",g):d[l]=(f,...n)=>r.add(f)&&u().then(()=>d[l](f,...n))})({
        key: "AIzaSyDU1wim3d3MYf-vvYS4JiCcnW278IaWrVs",
        v: "weekly"
      });
    </script>
    
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
    
    <style>
        :root { --accent: #00d2ff; --bg: #0a0a0a; }
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        
        #gatekeeper { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .gate-card { background: #1a1a1a; padding: 30px; border-radius: 20px; text-align: center; width: 320px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #444; background: #000; color: #fff; outline: none; }

        #app-shell { display: none; height: 100vh; width: 100vw; flex-direction: column; }
        #view-3d { height: 50%; position: relative; background: #000; overflow: hidden; }
        #view-2d { flex: 1; position: relative; background: #222; }
        
        #resizer { height: 10px; background: #333; cursor: ns-resize; z-index: 100; border-top: 1px solid #444; display: flex; align-items: center; justify-content: center; }
        #resizer::after { content: ''; width: 40px; height: 4px; background: #666; border-radius: 2px; }
        
        #video-container { position: absolute; top: 10px; left: 10px; width: 260px; height: 180px; background: #000; border-radius: 12px; border: 2px solid var(--accent); z-index: 1000; overflow: hidden; }
        
        button { padding: 12px 20px; border-radius: 20px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .active-btn { background: var(--accent); color: #000; }
        .inactive-btn { background: #333; color: #888; }
        #launch-btn { width: 100%; margin-top: 10px; background: var(--accent); color: #000; }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gate-card">
            <h2 style="margin-top:0">OMNISYNC 6.6</h2>
            <input type="text" id="room-id" placeholder="ROOM CODE (e.g., PARIS)">
            <input type="text" id="user-name" placeholder="YOUR NAME">
            <div style="display:flex; gap:10px; margin: 10px 0;">
                <button id="t-btn" class="active-btn" onclick="App.setRole('tourist')">TOURIST</button>
                <button id="g-btn" class="inactive-btn" onclick="App.setRole('guide')">GUIDE</button>
            </div>
            <button id="launch-btn" onclick="App.launch()">LAUNCH TOUR</button>
        </div>
    </div>

    <div id="app-shell">
        <div id="view-3d">
            <div id="video-container"></div>
        </div>
        <div id="resizer"></div>
        <div id="view-2d"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const App = {
            role: 'tourist',
            room: 'LOBBY',
            db: null,
            
            setRole: function(r) {
                this.role = r;
                document.getElementById('t-btn').className = r === 'tourist' ? 'active-btn' : 'inactive-btn';
                document.getElementById('g-btn').className = r === 'guide' ? 'active-btn' : 'inactive-btn';
            },

            launch: async function() {
                const name = document.getElementById('user-name').value || "User";
                this.room = document.getElementById('room-id').value.toUpperCase() || "LOBBY";
                
                document.getElementById('gatekeeper').style.display = 'none';
                document.getElementById('app-shell').style.display = 'flex';

                // Initialize Firebase
                const firebaseApp = initializeApp({
                    databaseURL: "https://virtual-tour-platform-492518-default-rtdb.firebaseio.com",
                    projectId: "virtual-tour-platform-492518"
                });
                this.db = getDatabase(firebaseApp);

                // Initialize Google Maps
                const { Map } = await google.maps.importLibrary("maps");
                const { StreetViewPanorama } = await google.maps.importLibrary("streetView");
                
                const initialPos = { lat: 48.8584, lng: 2.2945 }; // Eiffel Tower
                const map = new Map(document.getElementById('view-2d'), { center: initialPos, zoom: 18 });
                const pano = new StreetViewPanorama(document.getElementById('view-3d'), { position: initialPos, visible: true, disableDefaultUI: true });
                map.setStreetView(pano);

                // Initialize Video Call (Calling your specific Function URL)
                try {
                    const functionUrl = "https://us-central1-virtual-tour-platform-492518.cloudfunctions.net/createDailyRoom";
                    const response = await fetch(functionUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: { roomName: this.room } })
                    });
                    
                    const result = await response.json();
                    const dailyUrl = result.data?.url;

                    if(dailyUrl) {
                        const call = window.DailyIframe.createFrame(document.getElementById('video-container'), {
                            iframeStyle: { width: '100%', height: '100%', border: 'none' }
                        });
                        await call.join({ url: dailyUrl, userName: name });
                    }
                } catch(e) { 
                    console.error("Video handshake failed:", e); 
                }

                // Sync Logic
                if(this.role === 'guide') {
                    pano.addListener('position_changed', () => {
                        const p = pano.getPosition();
                        set(ref(this.db, `rooms/${this.room}/pos`), { lat: p.lat(), lng: p.lng() });
                    });
                } else {
                    onValue(ref(this.db, `rooms/${this.room}/pos`), (snapshot) => {
                        if(snapshot.exists()) pano.setPosition(snapshot.val());
                    });
                }
                
                this.initResizer();
            },

            initResizer: function() {
                const resizer = document.getElementById('resizer'), v3d = document.getElementById('view-3d');
                let isDragging = false;
                resizer.onmousedown = () => isDragging = true;
                document.onmousemove = (e) => {
                    if (!isDragging) return;
                    let val = (e.clientY / window.innerHeight) * 100;
                    if(val > 10 && val < 90) v3d.style.height = val + '%';
                };
                document.onmouseup = () => isDragging = false;
            }
        };

        window.App = App;
    </script>
</body>
</html>
